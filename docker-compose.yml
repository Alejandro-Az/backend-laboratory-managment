services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labmgmt_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - labmgmt

  webserver:
    image: nginx:alpine
    container_name: labmgmt_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - labmgmt
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: labmgmt_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - labmgmt

networks:
  labmgmt:
    driver: bridge

volumes:
  dbdata:
    driver: local
