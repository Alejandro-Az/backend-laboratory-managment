services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labmgmt_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - labmgmt

  webserver:
    image: nginx:alpine
    container_name: labmgmt_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - labmgmt
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: labmgmt_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - labmgmt

  frontend:
    build:
      context: ../laboratory-managment-frontend
      dockerfile: Dockerfile
      args:
        # El navegador del usuario hace las llamadas a la API,
        # por eso apunta a localhost (host) y no al nombre interno del contenedor.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: labmgmt_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"

networks:
  labmgmt:
    driver: bridge

volumes:
  dbdata:
    driver: local
